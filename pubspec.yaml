name: auto_image
description: A smart Flutter image widget that handles network, asset, file, base64, and SVG images with a unified API, caching, shimmer, BlurHash, and more.
version: 0.1.0
homepage: https://github.com/ahmedsabry10/auto_image
repository: https://github.com/ahmedsabry10/auto_image
issue_tracker: https://github.com/ahmedsabry10/auto_image/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4                # SVG support
  cached_network_image: ^3.4.1       # Network caching
  flutter_cache_manager: ^3.4.1      # Cache manager (clearCache)
  shimmer: ^3.0.0                    # Shimmer animation
  blurhash_dart: ^1.2.1              # BlurHash decoder (updated API)
  image: ^4.8.0                      # Image encoding for BlurHash
  http: ^1.6.0                       # HTTP requests
  path: ^1.9.1                       # File path detection

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  # No assets needed — pure Dart/Flutter package

screenshots:
  - description: Asset images, shapes, and transforms
    path: doc/screenshots/asset.png
  - description: SVG (asset and network) with imageColor tint
    path: doc/screenshots/svg.png
  - description: File and Base64 examples
    path: doc/screenshots/file_base64.png
  - description: Network images, blurhash, avatars, and retry
    path: doc/screenshots/network.png
